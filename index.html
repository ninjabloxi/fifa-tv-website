<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA TV - Splash</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="splash-body">
    <div class="splash-container" id="splashContainer">
        <img src="biglogo.png" alt="FIFA TV" class="splash-logo" id="splashLogo">
    </div>

    <div class="lang-modal" id="langModal">
        <div class="lang-card">
            <h1 class="lang-title" id="langTitle">Choisissez votre langue</h1>
            <p class="lang-subtitle">Sélectionnez votre langue pour continuer</p>
            <div class="lang-grid" id="langGrid">
                <!-- Langues injectées par script.js -->
            </div>
            <button class="apple-btn" id="langConfirmBtn" disabled>Continuer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
