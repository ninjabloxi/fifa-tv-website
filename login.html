<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - FIFA TV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <img src="logo.png" alt="FIFA TV" class="login-brand-logo">
            <h1 class="login-title">Connectez vous pour<br>accéder à FIFA TV</h1>
        </div>

        <div class="login-cards-wrapper">
            <!-- Mail Card (Désactivé) -->
            <div class="apple-card disabled-card">
                <div class="card-content-flex">
                    <img src="mail.png" alt="Mail" class="provider-icon">
                    <div class="card-text-group">
                        <span class="card-main-text">Continuer avec une adresse mail</span>
                        <span class="card-sub-text">(Connexion mail bientôt disponible)</span>
                    </div>
                </div>
            </div>

            <!-- Google Button -->
            <button class="apple-card interactive-card" id="googleLoginBtn">
                <div class="card-content-flex">
                    <img src="google.png" alt="Google" class="provider-icon">
                    <span class="card-main-text google-text">Continuer avec Google</span>
                </div>
            </button>
        </div>
    </div>

    <!-- Firebase SDK CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
