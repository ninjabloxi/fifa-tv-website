<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - FIFA TV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="home-body">
    <header class="app-header">
        <div class="header-left">
            <img src="logo.png" alt="FIFA TV" class="nav-logo">
            <span class="app-name">FIFA TV</span>
        </div>
        <div class="header-right">
            <button class="admin-fab" id="adminFabBtn" style="display: none;" title="Panneau Admin">+</button>
            <div class="user-profile" id="userProfileArea">
                <span id="userNameDisplay">Mon Compte</span>
                <button class="logout-btn" id="logoutBtn">Déconnexion</button>
            </div>
        </div>
    </header>

    <nav class="sub-nav" id="categoriesNav">
        <button class="nav-tab active" data-target="cat-all">Tout</button>
        <button class="nav-tab" data-target="cat-channels">Chaînes TV</button>
        <button class="nav-tab" data-target="cat-matches">Matchs en Direct</button>
        <button class="nav-tab" data-target="cat-favorites">Favoris</button>
    </nav>

    <main class="main-content" id="mainContentContainer">
        <section class="content-section" id="section-dynamic-videos">
            <h2 class="section-title" id="dynamicSectionTitle">Vidéos et Flux</h2>
            <div class="cards-grid" id="dynamicVideosGrid">
                </div>
        </section>
    </main>

    <div class="admin-modal" id="adminModal">
        <div class="admin-card">
            <div class="admin-header-modal">
                <h2>Panneau d'Administration FIFA TV</h2>
                <button class="close-modal-btn" id="closeAdminModal">&times;</button>
            </div>
            
            <div class="admin-tabs">
                <button class="admin-tab-btn active" data-tab="tab-add-video">Ajouter une Vidéo</button>
                <button class="admin-tab-btn" data-tab="tab-manage-cats">Gérer les Catégories</button>
            </div>

            <div class="admin-tab-content active" id="tab-add-video">
                <form id="addVideoForm">
                    <div class="form-group">
                        <label>Titre de la vidéo</label>
                        <input type="text" id="videoTitle" required placeholder="Ex: Résumé FIFA World Cup">
                    </div>
                    <div class="form-group">
                        <label>Lien de l'image miniature (URL)</label>
                        <input type="url" id="videoThumb" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Catégorie</label>
                        <select id="videoCategorySelect" required>
                            </select>
                    </div>
                    <div class="form-group">
                        <label>Lien de la vidéo (YouTube ou autre)</label>
                        <input type="url" id="videoLink" required placeholder="https://www.youtube.com/watch?v=... ou lien direct">
                    </div>
                    <button type="submit" class="apple-btn">Publier la vidéo</button>
                </form>
            </div>

            <div class="admin-tab-content" id="tab-manage-cats">
                <div class="form-group">
                    <label>Créer une nouvelle catégorie</label>
                    <div class="inline-group">
                        <input type="text" id="newCatName" placeholder="Nom de la catégorie">
                        <button type="button" id="createCatBtn" class="apple-btn-small">Créer</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Catégories existantes</label>
                    <div class="categories-list-admin" id="categoriesListAdmin">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
